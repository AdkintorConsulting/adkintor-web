<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADKINTOR EAMS + FORESIGHT</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/app/css/layout.css">
    <link rel="stylesheet" href="/app/css/print.css">
    
    <!-- Global Configuration -->
    
    <!-- Session Verification -->
    <script>
        // Verify session - redirect to login if not exists
        const session = localStorage.getItem('adkintor_session');
        
        if (!session) {
            window.location.replace('/app/index.html');
        }
        
        // Prevent back button after logout
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                const session = localStorage.getItem('adkintor_session');
                if (!session) {
                    window.location.replace('/app/index.html');
                }
            }
        });
    </script>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="main-header">
            <div class="logo-area">
                <img src="https://i.imgur.com/aQol7vU.png" alt="ADKINTOR Logo" class="logo-img" id="logoBtn">
                <h1 class="app-title">ADKINTOR EAMS + FORESIGHT</h1>
            </div>
            <div class="header-actions">
                <div class="client-info" id="clientInfoDisplay"></div>
                <div class="date-week" id="dateWeekDisplay"></div>
                <button class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> LOGOUT
                </button>
                <div class="dropdown-docs">
                    <button class="btn-docs" id="docsDropdownBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="dropdown-content" id="docsDropdown">
                        <div class="dropdown-section">
                            <div class="section-title">SOP & WORKFLOW</div>
                            <a href="#" data-doc="SOP Maintenance">SOP Maintenance</a>
                            <a href="#" data-doc="Workflow WO">Workflow WO</a>
                        </div>
                        <div class="dropdown-section">
                            <div class="section-title">ADKINTOR MANUALS</div>
                            <a href="#" data-doc="User Manual">User Manual</a>
                            <a href="#" data-doc="Quick Start Guide">Quick Start Guide</a>
                        </div>
                        <div class="dropdown-section">
                            <div class="section-title">FAQ's</div>
                            <a href="#" data-doc="Frequently Asked Questions">Frequently Asked Questions</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- SIDEBAR - FORESIGHT (Intelligence Modules) -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2 class="sidebar-title">FORESIGHT</h2>
                    <button class="sidebar-collapse-btn" id="sidebarCollapseBtn">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                </div>
                <nav class="sidebar-nav">
                    <button class="sidebar-btn" data-module="wo_intel" data-url="/app/modules/intelligence/wo_intel.html" data-permission="WO_IntelligenceUI" data-sidebar="foresight">
                        <i class="fas fa-tasks"></i>
                        <span>WORK ORDERS</span>
                    </button>
                    <button class="sidebar-btn" data-module="pvt_intel" data-url="/app/modules/intelligence/pvt_intel.html" data-permission="PVT_IntelligenceUI" data-sidebar="foresight">
                        <i class="fas fa-calendar-alt"></i>
                        <span>PREVENTIVE</span>
                    </button>
                    <button class="sidebar-btn" data-module="stk_intel" data-url="/app/modules/intelligence/stk_intel.html" data-permission="STK_IntelligenceUI" data-sidebar="foresight">
                        <i class="fas fa-boxes"></i>
                        <span>INVENTORY</span>
                    </button>
                    <button class="sidebar-btn" data-module="cal_intel" data-url="/app/modules/intelligence/cal_intel.html" data-permission="CAL_IntelligenceUI" data-sidebar="foresight">
                        <i class="fas fa-microscope"></i>
                        <span>CALIBRATION</span>
                    </button>
                    <button class="sidebar-btn" data-module="kpi_intel" data-url="/app/modules/intelligence/kpi_intel.html" data-permission="KPI_IntelligenceUI" data-sidebar="foresight">
                        <i class="fas fa-chart-line"></i>
                        <span>KPI</span>
                    </button>
                    <button class="sidebar-btn" data-module="consulting" data-url="/app/modules/intelligence/consulting.html" data-permission="CONSULTING_IntelligenceUI" data-sidebar="foresight">
                        <i class="fas fa-chalkboard-user"></i>
                        <span>CONSULTING</span>
                    </button>
                </nav>
            </aside>

            <!-- MAIN CONTENT - EAMS Area -->
            <main class="content-area" id="contentArea">
                <!-- EAMS Header -->
                <div class="eams-header">
                    <h2 class="eams-title">EAMS</h2>
                </div>
                
                <!-- BREADCRUMBS (nueva ubicación: arriba de los botones EAMS) -->
                <div class="breadcrumbs">
                    <span class="breadcrumb-item active" data-path="home">Home</span>
                    <span class="breadcrumb-separator">></span>
                    <span class="breadcrumb-item" id="dynamicBreadcrumb" style="display: none;"></span>
                </div>

                <!-- EAMS BUTTONS (6 buttons) -->
                <div class="eams-buttons">
                    <button class="eams-btn" data-eams="work_order" data-permission="WO_MainDispatcherUI">WORK ORDER</button>
                    <button class="eams-btn" data-eams="preventive" data-permission="PVT_MainDispatcherUI">PREVENTIVE</button>
                    <button class="eams-btn" data-eams="asset" data-permission="AST_MainDispatcherUI">ASSET</button>
                    <button class="eams-btn" data-eams="inventory" data-permission="STK_MainDispatcherUI">INVENTORY</button>
                    <button class="eams-btn" data-eams="calibrations" data-permission="CAL_MainDispatcherUI">CALIBRATIONS</button>
                    <button class="eams-btn" data-eams="plant_layout" data-permission="SYS_PlantLayoutUI">PLANT LAYOUT</button>
                    <button class="eams-btn" data-eams="sys_wizard" data-permission="SYS_WizardUI">CONFIG</button>
                </div>

                <!-- DYNAMIC CONTENT CONTAINER -->
                <div id="dynamicContent" class="dynamic-content">
                    <div id="loadingMessage" class="welcome-message">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <h2>Loading user permissions...</h2>
                        <p>Please wait</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODAL FOR IFRAMES (FORESIGHT / EAMS) -->
    <div id="iframeModal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <div></div>  <!-- Espacio vacío a la izquierda -->
                <div class="modal-controls">
                    <button class="modal-btn" id="minimizeModalBtn">−</button>
                    <button class="modal-btn" id="maximizeModalBtn">□</button>
                    <button class="modal-close" id="closeModalBtn">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <iframe id="intelIframe" src="" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <!-- MODAL FOR DOCUMENTS (PDF) -->
    <div id="docModal" class="modal-overlay" style="display: none;">
        <div class="modal-container modal-doc">
            <div class="modal-header">
                <h3 id="docModalTitle">Document</h3>
                <button class="modal-close" id="closeDocModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="pdfPlaceholder" class="pdf-placeholder">
                    <i class="fas fa-file-pdf"></i>
                    <p>PDF document will be available soon</p>
                    <div class="pdf-actions">
                        <button class="btn-pdf" id="downloadPdfBtn" disabled>
                            <i class="fas fa-download"></i> DOWNLOAD PDF
                        </button>
                        <button class="btn-pdf" id="printPdfBtn" disabled>
                            <i class="fas fa-print"></i> PRINT
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toastContainer"></div>

    <!-- SCRIPTS - orden correcto: config, logger, auth, layout -->
    <script src="/app/js/config.js"></script>
    <script src="/app/js/logger.js"></script>
    <script src="/app/js/auth.js"></script>
    <script src="/app/js/layout.js"></script>
</body>
</html>
