<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADKINTOR - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-box {
            background: rgba(30, 35, 55, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo img {
            height: 60px;
            width: auto;
            margin-bottom: 15px;
        }

        .login-logo h1 {
            color: #4a6cf7;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .login-logo p {
            color: #8a8faa;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b0b0b0;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1e2337;
            border: 1px solid #2a2f4a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 2px rgba(74, 108, 247, 0.2);
        }

        .form-group input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #4a6cf7;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:hover:not(:disabled) {
            background: #3a5ce0;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .forgot-password {
            text-align: right;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #8a8faa;
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .forgot-password a:hover {
            color: #4a6cf7;
        }

        .error-message {
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 10px;
            color: #ff6b6b;
            text-align: center;
            font-size: 13px;
        }

        /* MODAL PARA FORGOT PASSWORD */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-container {
            background: #1e2337;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: white;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8a8faa;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #ff6b6b;
        }

        .modal-body p {
            color: #b0b0b0;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .support-email {
            background: #0a0e27;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }

        .support-email a {
            color: #4a6cf7;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        .support-email a:hover {
            text-decoration: underline;
        }

        .btn-modal {
            width: 100%;
            padding: 10px;
            background: #4a6cf7;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-modal:hover {
            background: #3a5ce0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <img src="https://i.imgur.com/aQol7vU.png" alt="ADKINTOR Logo">
                <h1>ADKINTOR</h1>
                <p>EAMS + Intelligence</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="user@company.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>
                
                <div class="forgot-password">
                    <a id="forgotPasswordBtn">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div id="errorMessage" class="error-message" style="display:none;"></div>
        </div>
    </div>

    <!-- MODAL FOR FORGOT PASSWORD -->
    <div id="forgotModal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Reset Password</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p>Please contact your system administrator to reset your password.</p>
                <div class="support-email">
                    <a href="mailto:support@adkintor.com">support@adkintor.com</a>
                </div>
                <p style="font-size: 12px; text-align: center;">Include your email address and company name in the message.</p>
                <button class="btn-modal" id="closeModalActionBtn">Got it</button>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMessage');
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        const forgotModal = document.getElementById('forgotModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const closeModalActionBtn = document.getElementById('closeModalActionBtn');

        // Forgot Password Modal handlers
        forgotBtn.addEventListener('click', () => {
            forgotModal.style.display = 'flex';
        });

        function closeModal() {
            forgotModal.style.display = 'none';
        }

        closeModalBtn.addEventListener('click', closeModal);
        closeModalActionBtn.addEventListener('click', closeModal);

        // Close modal when clicking outside
        forgotModal.addEventListener('click', (e) => {
            if (e.target === forgotModal) {
                closeModal();
            }
        });

        // Login form handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Basic validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            // Show loading state
            setLoading(true);
            
            try {
                const result = await Auth.login(email, password);
                
                if (result.success) {
                    window.location.href = 'main.html';
                } else {
                    let errorMsg = 'Authentication failed';
                    if (result.error) {
                        if (result.error.includes('timeout') || result.error.includes('network')) {
                            errorMsg = 'Network error. Please check your connection.';
                        } else if (result.error.includes('password') || result.error.includes('credentials')) {
                            errorMsg = 'Invalid email or password';
                        } else {
                            errorMsg = result.error;
                        }
                    }
                    showError(errorMsg);
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Connection error. Please try again later.');
            } finally {
                setLoading(false);
            }
        });
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                if (errorDiv.style.display === 'block') {
                    errorDiv.style.display = 'none';
                }
            }, 5000);
        }
        
        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<div class="spinner"></div> Signing in...';
                emailInput.disabled = true;
                passwordInput.disabled = true;
            } else {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
                emailInput.disabled = false;
                passwordInput.disabled = false;
            }
        }
    </script>
</body>
</html>
