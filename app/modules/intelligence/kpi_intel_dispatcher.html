<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Foresight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dispatcher {
            text-align: center;
            padding: 2rem;
        }
        .dispatcher h2 {
            color: #1a1a2e;
            font-size: 1.8rem;
            margin-bottom: 2rem;
        }
        .dispatcher h2 i {
            margin-right: 12px;
            color: #1a1a2e;
        }
        .kpi-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 2rem 3rem;
            cursor: pointer;
            transition: all 0.25s ease;
            max-width: 400px;
            margin: 0 auto;
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            border-color: #1a1a2e;
        }
        .kpi-card i {
            font-size: 3rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }
        .kpi-card h3 {
            color: #1a1a2e;
            font-size: 1.2rem;
        }
        .kpi-card p {
            color: #888;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dispatcher">
        <h2><i class="fas fa-chart-line"></i> KPI FORESIGHT</h2>
        <div class="kpi-card" id="openKpiBtn">
            <i class="fas fa-chart-line"></i>
            <h3>Open KPI Dashboard</h3>
            <p>View maintenance performance KPIs</p>
        </div>
    </div>

<script>
    function openKpi() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'KPI Foresight',
            url: '/app/modules/intelligence/kpi_intel.html'
        }, '*');
    }
    
    document.getElementById('openKpiBtn').onclick = openKpi;
</script>
</body>
</html>
