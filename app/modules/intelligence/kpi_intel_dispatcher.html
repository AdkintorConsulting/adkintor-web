<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Foresight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dispatcher {
            text-align: center;
            padding: 2rem;
        }
        .dispatcher h2 {
            color: #1a1a2e;
            font-size: 1.8rem;
            margin-bottom: 2rem;
        }
        .dispatcher h2 i {
            margin-right: 12px;
            color: #1a1a2e;
        }
        .module-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 2rem 3rem;
            cursor: pointer;
            transition: all 0.25s ease;
            max-width: 400px;
            margin: 0 auto;
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            border-color: #1a1a2e;
        }
        .module-card i {
            font-size: 3rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }
        .module-card h3 {
            color: #1a1a2e;
            font-size: 1.2rem;
        }
        .module-card p {
            color: #888;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        .toast.error {
            background: #dc3545;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dispatcher">
        <h2><i class="fas fa-chart-pie"></i> KPI Foresight</h2>
        <div class="module-card" id="openModuleBtn">
            <i class="fas fa-chart-pie"></i>
            <h3>Open KPI Foresight</h3>
            <p>View KPI metrics</p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

<script>
    function showMessage(message, isError = false) {
        const toast = document.getElementById('toast');
        if (toast) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    }

    function openModule() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'KPI Foresight',
            url: '/app/modules/intelligence/kpi_intel.html'
        }, '*');
    }
    
    document.getElementById('openModuleBtn').onclick = openModule;
</script>
</body>
</html>
