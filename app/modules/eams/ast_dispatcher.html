<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSET Management Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            width: 100%;
            min-height: 100vh;
        }
        
        .ast-dispatcher {
            width: 100%;
            max-width: none;
            padding: 2rem;
        }
        
        .dispatcher-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .dispatcher-header h2 {
            color: #1a1a2e;
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        .dispatcher-header h2 i {
            margin-right: 12px;
            color: #1a1a2e;
        }
        
        .ast-buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
        }
        
        .ast-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 1.25rem 0.75rem;
            text-align: center;
            transition: all 0.25s ease;
            cursor: pointer;
        }
        
        .ast-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            border-color: #1a1a2e;
        }
        
        .ast-card i {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 0.75rem;
            display: inline-block;
        }
        
        .ast-card h3 {
            color: #1a1a2e;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }
        
        .ast-card p {
            color: #888;
            font-size: 0.7rem;
        }
        
        @media (max-width: 700px) {
            .ast-buttons-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        
        .toast.error {
            background: #dc3545;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="ast-dispatcher">
        <div class="dispatcher-header">
            <h2>
                <i class="fas fa-cubes"></i> ASSET MANAGEMENT HUB
            </h2>
        </div>
        
        <div class="ast-buttons-grid">
            <div class="ast-card" id="addAssetBtn">
                <i class="fas fa-plus-circle"></i>
                <h3>ADD ASSET</h3>
                <p>Register new equipment</p>
            </div>
            
            <div class="ast-card" id="assetMasterBtn">
                <i class="fas fa-database"></i>
                <h3>ASSET MASTER</h3>
                <p>View and manage database</p>
            </div>
            
            <div class="ast-card" id="modifyAssetBtn">
                <i class="fas fa-edit"></i>
                <h3>MODIFY ASSET</h3>
                <p>Update existing information</p>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
<script>
    // ... (el mismo script que tenías, sin cambios)
    function hasPermission(permissionName) {
        return window.dispatcherPermissions && window.dispatcherPermissions.includes(permissionName);
    }
    
    async function waitForPermissions() {
        let attempts = 0;
        while (!window.parent.currentPermissions && attempts < 50) {
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
        }
        return window.parent.currentPermissions || [];
    }
    
    (async function() {
        let permissions = [];
        
        try {
            permissions = await waitForPermissions();
            console.log('Permisos obtenidos del padre:', permissions);
        } catch(e) {
            console.error('Error loading permissions from parent:', e);
        }
        
        if (!permissions || permissions.length === 0) {
            try {
                const session = JSON.parse(localStorage.getItem('adkintor_session'));
                if (session && session.eamsApiUrl) {
                    const response = await fetch('https://adkintor-proxy.empty-bonus-1852.workers.dev/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            targetUrl: session.eamsApiUrl,
                            payload: { action: 'getPermissionsByRole', args: [session.role] }
                        })
                    });
                    const data = await response.json();
                    if (data.success) permissions = data.data;
                    console.log('Permisos obtenidos de API directa:', permissions);
                }
            } catch(e) {
                console.error('Error loading permissions from API:', e);
            }
        }
        
        window.dispatcherPermissions = permissions;
        console.log('Permisos finales:', window.dispatcherPermissions);

        if (!hasPermission('AST_AddUI')) {
            const btn = document.getElementById('addAssetBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!hasPermission('AST_MasterUI')) {
            const btn = document.getElementById('assetMasterBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!hasPermission('AST_ModifyUI')) {
            const btn = document.getElementById('modifyAssetBtn');
            if (btn) btn.style.display = 'none';
        }
    })();        

    function showMessage(message, isError = false) {
        const toast = document.getElementById('toast');
        if (toast) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    }
        
    function openAddAsset() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'Add Asset',
            url: '/app/modules/eams/ast_add.html'
        }, '*');
    }
    
    function openAssetMaster() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'Asset Master',
            url: '/app/modules/eams/ast_master.html'
        }, '*');
    }
    
    function openModifyAsset() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'Modify Asset',
            url: '/app/modules/eams/ast_modify.html'
        }, '*');
    }
    
    document.getElementById('addAssetBtn').onclick = openAddAsset;
    document.getElementById('assetMasterBtn').onclick = openAssetMaster;
    document.getElementById('modifyAssetBtn').onclick = openModifyAsset;
</script>
</body>
</html>
