<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTORY Control Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            width: 100%;
            min-height: 100vh;
        }
        
        .stk-dispatcher {
            width: 100%;
            max-width: none;
            padding: 2rem;
        }
        
        .dispatcher-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .dispatcher-header h2 {
            color: #1a1a2e;
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        .dispatcher-header h2 i {
            margin-right: 12px;
            color: #1a1a2e;
        }
        
        .stk-buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
        }
        
        .stk-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 1.25rem 0.75rem;
            text-align: center;
            transition: all 0.25s ease;
            cursor: pointer;
        }
        
        .stk-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            border-color: #1a1a2e;
        }
        
        .stk-card i {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 0.75rem;
            display: inline-block;
        }
        
        .stk-card h3 {
            color: #1a1a2e;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }
        
        .stk-card p {
            color: #888;
            font-size: 0.7rem;
        }
        
        @media (max-width: 700px) {
            .stk-buttons-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        
        .toast.error {
            background: #dc3545;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="stk-dispatcher">
        <div class="dispatcher-header">
            <h2>
                <i class="fas fa-boxes"></i> INVENTORY CONTROL CENTER
            </h2>
        </div>
        
        <div class="stk-buttons-grid">
            <div class="stk-card" id="viewerBtn">
                <i class="fas fa-eye"></i>
                <h3>INVENTORY VIEWER</h3>
                <p>Read-only catalog viewer</p>
            </div>
            
            <div class="stk-card" id="inventoryBtn">
                <i class="fas fa-boxes"></i>
                <h3>INVENTORY HUB</h3>
                <p>Manage stock and catalog</p>
            </div>
            
            <div class="stk-card" id="procurementBtn">
                <i class="fas fa-truck"></i>
                <h3>PROCUREMENT HUB</h3>
                <p>Requisitions and POs</p>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
<script>
    function hasPermission(permissionName) {
        return window.dispatcherPermissions && window.dispatcherPermissions.includes(permissionName);
    }
    
    async function waitForPermissions() {
        let attempts = 0;
        while (!window.parent.currentPermissions && attempts < 50) {
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
        }
        return window.parent.currentPermissions || [];
    }
    
    (async function() {
        let permissions = [];
        
        try {
            permissions = await waitForPermissions();
            // console.log('Permisos obtenidos del padre:', permissions);  // COMENTADO
        } catch(e) {
            // console.error('Error loading permissions from parent:', e);  // COMENTADO
        }
        
        if (!permissions || permissions.length === 0) {
            try {
                const session = JSON.parse(localStorage.getItem('adkintor_session'));
                if (session && session.eamsApiUrl) {
                    const response = await fetch('https://adkintor-proxy.empty-bonus-1852.workers.dev/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            targetUrl: session.eamsApiUrl,
                            payload: { action: 'getPermissionsByRole', args: [session.role] }
                        })
                    });
                    const data = await response.json();
                    if (data.success) permissions = data.data;
                    // console.log('Permisos obtenidos de API directa:', permissions);  // COMENTADO
                }
            } catch(e) {
                // console.error('Error loading permissions from API:', e);  // COMENTADO
            }
        }
        
        window.dispatcherPermissions = permissions;
        // console.log('Permisos finales:', window.dispatcherPermissions);  // COMENTADO

        if (!hasPermission('STK_InventoryViewerUI')) {
            const btn = document.getElementById('viewerBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!hasPermission('STK_InventoryHubUI')) {
            const btn = document.getElementById('inventoryBtn');
            if (btn) btn.style.display = 'none';
        }
        if (!hasPermission('STK_ProcurementHubUI')) {
            const btn = document.getElementById('procurementBtn');
            if (btn) btn.style.display = 'none';
        }
    })();   

    function showMessage(message, isError = false) {
        const toast = document.getElementById('toast');
        if (toast) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    }
        
    function openViewer() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'Inventory Viewer',
            url: '/app/modules/eams/stk_viewer.html'
        }, '*');
    }
    
    function openInventory() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'Inventory Hub',
            url: '/app/modules/eams/stk_inventory.html'
        }, '*');
    }
    
    function openProcurement() {
        window.parent.postMessage({
            type: 'openIframeModal',
            title: 'Procurement Hub',
            url: '/app/modules/eams/stk_procurement.html'
        }, '*');
    }
    
    document.getElementById('viewerBtn').onclick = openViewer;
    document.getElementById('inventoryBtn').onclick = openInventory;
    document.getElementById('procurementBtn').onclick = openProcurement;
</script>
</body>
</html>
