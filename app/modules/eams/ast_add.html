<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Asset - ADKINTOR EAMS</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }
        
        .modal-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .modal-header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
        }
        
        .btn-close:hover {
            opacity: 0.8;
        }
        
        .breadcrumbs {
            padding: 12px 24px;
            background: #eef2f5;
            font-size: 0.8rem;
            color: #555;
            border-bottom: 1px solid #ddd;
        }
        
        .breadcrumbs a {
            color: #1a1a2e;
            text-decoration: none;
        }
        
        .breadcrumbs a:hover {
            text-decoration: underline;
        }
        
        .eams-body {
            padding: 24px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .field-group {
            margin-bottom: 15px;
        }
        
        .field-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.85rem;
        }
        
        .required-field label::after {
            content: " *";
            color: #dc3545;
            font-weight: bold;
        }
        
        .field-group input,
        .field-group select,
        .field-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .field-group input:focus,
        .field-group select:focus,
        .field-group textarea:focus {
            outline: none;
            border-color: #1a1a2e;
            box-shadow: 0 0 0 2px rgba(26,26,46,0.1);
        }
        
        .invalid-field {
            border: 2px solid #dc3545 !important;
            background-color: rgba(220, 53, 69, 0.05);
        }
        
        .field-note {
            font-size: 0.65rem;
            color: #6c757d;
            margin-top: 4px;
        }
        
        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .btn-primary {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background: #2c2c4e;
        }
        
        .btn-primary:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .eams-status-bar {
            background: #f8f9fa;
            padding: 8px 24px;
            font-size: 0.75rem;
            color: #6c757d;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        
        .banner {
            padding: 12px 24px;
            margin: 0;
            display: none;
        }
        
        .banner.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border-bottom: 1px solid #c3e6cb;
        }
        
        .banner.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border-bottom: 1px solid #f5c6cb;
        }
        
        .user-badge {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .eams-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
        }
        
        .eams-header h2 {
            font-size: 1.25rem;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.error {
            background: #dc3545;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .loading-spinner {
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            text-align: center;
        }
        
        .loading-spinner i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="modal-container">
    <div class="modal-header">
        <h2><i class="fas fa-plus-circle"></i> Add Asset</h2>
        <button class="btn-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="breadcrumbs">
        <a href="#" onclick="closeModal()">Inicio</a> &gt; 
        <a href="#" onclick="closeModal()">ASSETS</a> &gt; 
        <span>Add Asset</span>
    </div>
    
    <div id="banner-msg" class="banner"></div>
    
    <div class="eams-body">
        <form id="assetForm" novalidate>
            <div class="grid-2">
                <div class="field-group required-field">
                    <label>Operational Area</label>
                    <select id="area" name="area" onchange="syncUI()" required>
                        <option value=""> — Select — </option>
                    </select>
                </div>
                <div class="field-group required-field">
                    <label>Asset Type</label>
                    <select id="type" name="type" onchange="syncUI()" required>
                        <option value=""> — Select — </option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="field-group">
                    <label>Parent Asset ID</label>
                    <select id="parentID" name="parentID">
                        <option value="N/A">N/A - None / Root Level</option>
                    </select>
                </div>
                <div class="field-group required-field">
                    <label>Asset Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Centrifugal Pump P-101" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="field-group required-field">
                    <label>Category / Subtype</label>
                    <select id="category" name="category" class="lockable" required>
                        <option value=""> — Select — </option>
                    </select>
                </div>
                <div class="field-group required-field">
                    <label>Current Status</label>
                    <select id="status" name="status" required>
                        <option value=""> — Select — </option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="field-group">
                    <label>Manufacturer</label>
                    <input type="text" name="mfr" class="lockable" placeholder="e.g. Siemens">
                </div>
                <div class="field-group">
                    <label>Model</label>
                    <input type="text" name="model" class="lockable" placeholder="e.g. P-1000">
                </div>
            </div>

            <div class="grid-2">
                <div class="field-group">
                    <label>Serial Number</label>
                    <input type="text" name="serial" class="lockable" placeholder="e.g. SN-12345">
                </div>
                <div class="field-group">
                    <label>Year of Install</label>
                    <input type="number" name="year" class="lockable" placeholder="e.g. 2020" min="1950" max="2030">
                    <div class="field-note">Optional - Format: YYYY</div>
                </div>
            </div>

            <div style="background: #ececec; padding: 15px; border-radius: 4px; margin: 10px 0;">
                <label style="color: #1a1a2e; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 15px; display: block; font-weight: 700;">
                    ⚙️ Criticality Matrix Evaluation
                </label>
                <div id="critGrid" class="grid-2"></div>
                <div id="critBadge" style="margin-top: 15px; padding: 10px; text-align: center; border-radius: 4px; font-weight: 700; background: #ddd;">
                    AWAITING DATA...
                </div>
            </div>

            <div class="btn-container">
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" id="btnSubmit" class="btn-primary">Register Asset</button>
            </div>
        </form>
    </div>
    
    <div class="eams-status-bar">
        <span>System Status: <strong id="footer-status">Ready</strong></span>
        <span>EAMS Asset Management</span>
    </div>
</div>

<div id="toast" class="toast"></div>
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner">
        <i class="fas fa-spinner"></i>
        <p id="loadingMessage">Loading...</p>
    </div>
</div>

<script>
    // Configuración
    const PROXY_URL = 'https://adkintor-proxy.empty-bonus-1852.workers.dev/';
    let EAMS_API_URL = null;
    let DB = {};
    let currentUserEmail = '';
    
    // Cargar la URL de EAMS API desde localStorage
    function loadApiUrl() {
        const session = localStorage.getItem('adkintor_session');
        if (session) {
            try {
                const sessionData = JSON.parse(session);
                EAMS_API_URL = sessionData.eamsApiUrl;
                // currentUserEmail = sessionData.email || '';
                // document.getElementById('user-display').innerText = currentUserEmail;
            } catch(e) {
                console.error('Error parsing session:', e);
            }
        }
    }
    
    // Mostrar/ocultar loading
    function showLoading(message) {
        const overlay = document.getElementById('loadingOverlay');
        const msgEl = document.getElementById('loadingMessage');
        if (msgEl) msgEl.innerText = message || 'Loading...';
        if (overlay) overlay.style.display = 'flex';
    }
    
    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = 'none';
    }
    
    // Mostrar mensaje temporal
    function showMessage(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    function showBanner(message, type) {
        const banner = document.getElementById('banner-msg');
        banner.textContent = message;
        banner.className = 'banner ' + type;
        setTimeout(() => {
            banner.className = 'banner';
        }, 5000);
    }
    
    // Llamar a la API a través del proxy
    async function callApi(action, args = []) {
        if (!EAMS_API_URL) {
            throw new Error('API URL not configured');
        }
        
        const response = await fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                targetUrl: EAMS_API_URL,
                payload: { action: action, args: args }
            })
        });
        
        const result = await response.json();
        
        if (!result.success) {
            throw new Error(result.error || 'Unknown error');
        }
        
        return result.data;
    }
    
    // Cerrar modal
    function closeModal() {
        window.parent.postMessage('closeIframe', '*');
    }
    
    // Helper functions
    function sanitizeInput(str) {
        if (!str) return '';
        return String(str).replace(/[<>{}[\]\\]/g, '').trim();
    }
    
    function fillSelect(id, list) {
        const s = document.getElementById(id);
        if (!s) return;
        let html = `<option value=""> — Select — </option>`;
        if (list && list.length > 0) {
            list.forEach(v => {
                const value = typeof v === 'object' ? v.name : v;
                html += `<option value="${value.replace(/"/g, '&quot;')}">${value}</option>`;
            });
        }
        s.innerHTML = html;
    }
    
    function fillSelectWithPlaceholder(id, list, placeholderText) {
        const s = document.getElementById(id);
        if (!s) return;
        let html = `<option value="">${placeholderText}</option>`;
        if (list && list.length > 0) {
            list.forEach(v => {
                const value = typeof v === 'object' ? v.name : v;
                html += `<option value="${value.replace(/"/g, '&quot;')}">${value}</option>`;
            });
        }
        s.innerHTML = html;
    }
    
    function setupCriticalityGrid() {
        const grid = document.getElementById('critGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        if (!DB.criteria || DB.criteria.length === 0) {
            grid.innerHTML = '<div class="field-group" style="color: red;">No criteria found in SETUP_AST. Please configure column H.</div>';
            return;
        }
        
        const staticNames = ['hse', 'prod', 'usage', 'oper', 'redun'];
        
        for (let i = 0; i < DB.criteria.length && i < staticNames.length; i++) {
            const c = DB.criteria[i];
            const staticName = staticNames[i];
            
            grid.innerHTML += `
                <div class="field-group required-field">
                    <label>${c.name}</label>
                    <select name="${staticName}" class="crit-input" data-crit-name="${c.name.toLowerCase()}" onchange="recalc()" required>
                        <option value=""> — Select — </option>
                        <option value="1">1 (Low: ${c.low})</option>
                        <option value="3">3 (Medium: ${c.med})</option>
                        <option value="5">5 (High: ${c.high})</option>
                    </select>
                </div>`;
        }
    }
    
    function recalc() {
        let score = 0;
        let totalWeight = 0;
        let allSelected = true;
        
        const critSelects = document.querySelectorAll('.crit-input');
        const values = {};
        
        for (let i = 0; i < critSelects.length; i++) {
            const select = critSelects[i];
            const critName = select.getAttribute('data-crit-name');
            const value = select.value;
            
            if (!value || value === '') {
                allSelected = false;
                continue;
            }
            
            values[critName] = parseInt(value);
        }
        
        if (!allSelected) {
            document.getElementById('critBadge').innerHTML = '⚠️ Complete all criteria above';
            document.getElementById('critBadge').style.background = '#f1c40f';
            document.getElementById('critBadge').style.color = '#333';
            return { score: 0, level: 'INCOMPLETE' };
        }
        
        const weights = DB.weights || {};
        for (const [critName, value] of Object.entries(values)) {
            const weight = weights[critName] || 0;
            score += value * weight;
            totalWeight += weight;
        }
        
        if (totalWeight === 0 && critSelects.length > 0) {
            const equalWeight = 1 / critSelects.length;
            for (const [critName, value] of Object.entries(values)) {
                score += value * equalWeight;
            }
        }
        
        const badge = document.getElementById('critBadge');
        let level = "UNKNOWN";
        let bgColor = "#7f8c8d";
        let textColor = "white";
        
        const thresholds = DB.thresholds || { critical: 4.0, important: 2.6 };
        
        if (score >= thresholds.critical) {
            level = "A - CRITICAL";
            bgColor = "#c0392b";
        } else if (score >= thresholds.important) {
            level = "B - IMPORTANT";
            bgColor = "#d35400";
        } else if (score >= 1.0) {
            level = "C - STANDARD";
            bgColor = "#27ae60";
        }
        
        badge.style.background = bgColor;
        badge.style.color = textColor;
        badge.innerHTML = `${level} (SCORE: ${score.toFixed(2)})`;
        
        return { score: score.toFixed(2), level: level };
    }
    
    function syncUI() {
        const typeSelect = document.getElementById('type');
        const selectedType = typeSelect ? typeSelect.value : '';
        
        const topLevelTypes = DB.assetTypes && DB.assetTypes.length > 0 ? DB.assetTypes : [];
        const isTopLevelType = topLevelTypes.length > 0 && selectedType === topLevelTypes[0];
        
        document.querySelectorAll('.lockable').forEach(el => el.disabled = isTopLevelType);
        
        const area = document.getElementById('area').value;
        const pSel = document.getElementById('parentID');
        
        if (isTopLevelType) {
            pSel.innerHTML = `<option value="N/A">N/A - None / Root Level</option><option value="${area}">${area} (Root Area)</option>`;
            pSel.value = area;
        } else if (area && DB.parents) {
            const filtered = DB.parents.filter(p => p.area === area);
            let html = '<option value="N/A">N/A - None / Root Level</option>';
            filtered.forEach(p => {
                html += `<option value="${p.id}">${p.id} - ${p.name}</option>`;
            });
            pSel.innerHTML = html;
        }
        recalc();
    }
    
    function disableButton(id, text) {
        const btn = document.getElementById(id);
        if (btn) {
            btn.disabled = true;
            btn.textContent = text;
        }
    }
    
    function enableButton(id) {
        const btn = document.getElementById(id);
        if (btn) {
            btn.disabled = false;
            btn.textContent = 'Register Asset';
        }
    }
    
    function validateForm() {
        let isValid = true;
        const requiredSelects = ['area', 'type', 'status'];
        const requiredInput = document.getElementById('name');
        
        document.querySelectorAll('.invalid-field').forEach(el => {
            el.classList.remove('invalid-field');
        });
        
        requiredSelects.forEach(id => {
            const el = document.getElementById(id);
            if (el && !el.disabled && (!el.value || el.value === '')) {
                el.classList.add('invalid-field');
                isValid = false;
            }
        });
        
        const categoryEl = document.getElementById('category');
        if (categoryEl && !categoryEl.disabled && (!categoryEl.value || categoryEl.value === '')) {
            categoryEl.classList.add('invalid-field');
            isValid = false;
        }
        
        if (!requiredInput.value || requiredInput.value.trim() === '') {
            requiredInput.classList.add('invalid-field');
            isValid = false;
        }
        
        const critInputs = document.querySelectorAll('.crit-input');
        for (let i = 0; i < critInputs.length; i++) {
            if (!critInputs[i].value || critInputs[i].value === '') {
                critInputs[i].classList.add('invalid-field');
                isValid = false;
            }
        }
        
        if (!isValid) {
            showBanner('Please complete all required fields (marked with *)', 'error');
        }
        
        return isValid;
    }
    
    // Cargar configuración inicial
    async function loadConfig() {
        try {
            const response = await callApi('AST_getAssetConfig', []);
            DB = response.data;
            
            const areaNames = DB.areas ? DB.areas.map(a => a.name) : [];
            fillSelect('area', areaNames);
            fillSelect('type', DB.assetTypes || []);
            const categoryNames = DB.categories ? DB.categories.map(c => c.name) : [];
            fillSelect('category', categoryNames);
            fillSelect('status', DB.statuses || []);
            
            setupCriticalityGrid();
            syncUI();
            document.getElementById('footer-status').innerText = 'Ready';
        } catch (error) {
            showBanner('Failed to load configuration: ' + error.message, 'error');
            document.getElementById('btnSubmit').disabled = true;
        }
    }
    
    // Guardar activo
    async function saveAsset(assetData) {
        return await callApi('AST_saveNewAsset', [assetData]);
    }
    
    // Inicializar
    async function init() {
        loadApiUrl();
        if (EAMS_API_URL) {
            showLoading('Loading configuration...');
            await loadConfig();
            hideLoading();
        } else {
            showMessage('API URL not configured. Please log in again.', true);
        }
    }
    
    // Submit form
    document.getElementById('assetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (!validateForm()) return;
        
        disableButton('btnSubmit', 'REGISTERING...');
        showLoading('Processing Transaction...');
        
        const f = new FormData(e.target);
        const payload = Object.fromEntries(f.entries());
        const crit = recalc();
        
        if (crit.level === 'INCOMPLETE') {
            hideLoading();
            enableButton('btnSubmit');
            showBanner('Please complete all criticality criteria', 'error');
            return;
        }
        
	payload.name = sanitizeInput(payload.name);
        
        // Obtener prefijos para generar ID
        const areaObj = DB.areas.find(a => a.name === payload.area);
        const catObj = DB.categories.find(c => c.name === payload.category);
        const topLevelTypes = DB.assetTypes || [];
        const isTopLevel = topLevelTypes.includes(payload.type);
        
        // Mapear campos para la API original
        const assetData = {
            area: payload.area,
            areaPrefix: areaObj ? areaObj.prefix : "GEN",
            name: payload.name,
            parentID: payload.parentID || 'N/A',
            type: payload.type,
            category: isTopLevel ? "" : payload.category,
            catPrefix: isTopLevel ? (areaObj ? areaObj.prefix : "GEN") : (catObj ? catObj.prefix : "GEN"),
            status: payload.status,
            mfr: payload.mfr || '',
            model: payload.model || '',
            serial: payload.serial || '',
            year: payload.year || '',
            hse: parseInt(payload.hse) || 1,
            prod: parseInt(payload.prod) || 1,
            usage: parseInt(payload.usage) || 1,
            oper: parseInt(payload.oper) || 1,
            redun: parseInt(payload.redun) || 1,
            score: crit.score,
            level: crit.level
        };
        
        try {
            const result = await saveAsset(assetData);
            hideLoading();
            enableButton('btnSubmit');
            showBanner(result.message || 'Asset saved successfully!', 'success');
            setTimeout(() => closeModal(), 2000);
        } catch (error) {
            hideLoading();
            enableButton('btnSubmit');
            showBanner('Error: ' + error.message, 'error');
        }
    });
    
    init();
</script>
</body>
</html>
